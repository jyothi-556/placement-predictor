<!DOCTYPE html>
<html>
<head>
    <title>Placement Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>🎓 Placement Predictor</h2>

    <form action="/predict" method="post">
        <input type="number" name="attendance" placeholder="📊 Attendance %" required>
        <input type="number" name="marks" placeholder="📝 Marks %" required>
        <input type="number" name="projects" placeholder="💼 Projects" required>
        <input type="number" name="internships" placeholder="🏢 Internships" required>
        <input type="number" name="communication" placeholder="🗣 Communication (1-10)" required>
        <input type="number" name="backlogs" placeholder="⚠ Backlogs" required>
        <input type="number" step="0.01" name="cgpa" placeholder="🎯 CGPA" required>

        <button type="submit">Predict 🚀</button>
    </form>

    {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
    {% endif %}
</div>

</body>
</html>
